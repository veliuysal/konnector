# Template site config — copy and rename for your domain, then enable.
#   cp example.yaml mysite.yaml
#   # edit domains + upstream, then:
#   enabled: true
#
# One HTTP/HTTPS listener (ports from env) serves all site YAMLs by Host.
# List every apex, subdomain, or a wildcard like *.example.com.
enabled: false

domains:
  - example.com
  - www.example.com
  - "*.example.com"          # app.example.com, api.example.com, …

proxy:
  mode: direct
  upstream:
    instance: 127.0.0.1:8080

redirects:
  - from: /home
    to: /
    behavior: redirect
    match: exact

internal_routes: []

access:
  mode: all

cache:
  enabled: false

forwarding: direct

# Upstream HTTP protocol version (1.1, 2, 3, auto). HTTP/2 and HTTP/3 require TLS.
http:
  version: auto

# Request logging for this site (off, error, warn, info, debug).
# Access lines go to logs/<yaml-stem>/access.log.
logging:
  level: info
