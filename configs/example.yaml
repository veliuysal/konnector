enabled: true

# Set enabled: false to keep this file but stop serving the site.
domains:
  - example.com
  - www.example.com

proxy:
  mode: direct
  upstream:
    instance: 127.0.0.1:8080

redirects:
  - from: /home
    to: /
    behavior: redirect
    match: exact

internal_routes: []

access:
  mode: all

cache:
  enabled: false

forwarding: direct

# Upstream HTTP protocol version (1.1, 2, 3, auto). HTTP/2 and HTTP/3 require TLS.
http:
  version: auto

# Request logging for this site (off, error, warn, info, debug).
# Any level except off logs proxied HTTP requests at INFO. Use debug for upstream and timing details.
# TCP logging uses the root.yaml default. Omit to inherit the root default.
logging:
  level: info
