# Template site config — copy and rename for your domain, then enable.
#   cp example.yaml mysite.yaml
#   # edit domains + upstream, then:
#   enabled: true
#
# One HTTP/HTTPS listener (ports from env) serves all site YAMLs by Host.
# listen: http (default) | https | both — which listener this site answers on.
# traffic: http (default) | websocket | both — request kinds.
# Same hostname can be split across YAMLs by listen and/or traffic.
enabled: false

domains:
  - example.com
  - www.example.com
  - "*.example.com"          # app.example.com, api.example.com, …

# http (default) | https | both  (aliases: 80, 443)
listen: both

# Redirect plain HTTP → HTTPS (308). Requires listen that includes http.
redirect_https: true

# http (default) | websocket | both
# traffic: http

# Single upstream:
proxy:
  mode: direct
  upstream:
    instance: 127.0.0.1:8080

# Or multiple instances (load-balanced):
# proxy:
#   mode: load_balanced
#   upstreams:
#     - instance: 127.0.0.1:8080
#     - instance: 127.0.0.1:8081
#   health_check: true
#   health_check_interval_seconds: 5

redirects:
  - from: /home
    to: /
    behavior: redirect
    match: exact

internal_routes: []

access:
  mode: all

cache:
  enabled: false

forwarding: direct

# Upstream HTTP protocol version (1.1, 2, 3, auto).
# WebSocket upgrades always use HTTP/1.1 to the upstream.
http:
  version: auto

logging:
  level: info
