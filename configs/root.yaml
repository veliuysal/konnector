# Fallback for requests that do not match any site domain.
# Set enabled: false to show the "Server is working" page for unmatched hosts.
# When this file is missing or empty, root proxy defaults to disabled.
enabled: true

# Global default for request logging (off, error, warn, info, debug).
# Required for localhost / root proxy logs. Any level except off logs proxied requests at INFO.
# Site configs can override HTTP logging with their own logging.level.
logging:
  level: info

# Default upstream HTTP protocol version for the root proxy (1.1, 2, 3, auto).
http:
  version: auto

upstream:
  instance: 127.0.0.1:3000
  version: auto
