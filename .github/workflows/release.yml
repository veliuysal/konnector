name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: konnector

jobs:
  linux:
    name: Build Linux package
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo files
        uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes debhelper cargo rustc libssl-dev pkg-config clang cmake perl
      - name: Set package version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${TAG}\"/" Cargo.toml
          cargo update -p konnector
          sed -i "1s/(.*) /(${TAG}-1) /" debian/changelog
      - name: Build Debian package
        run: |
          chmod +x debian/rules
          dpkg-buildpackage -us -uc -b
      - name: Build release tarball
        run: |
          cargo build --release --locked --bin "${BINARY_NAME}"
          mkdir -p artifact
          cp "target/release/${BINARY_NAME}" "artifact/${BINARY_NAME}"
          cp -R configs artifact/configs
          chmod +x "artifact/${BINARY_NAME}"
          tar -C artifact -czf "${BINARY_NAME}-${GITHUB_REF_NAME}.tar.gz" "${BINARY_NAME}" configs
          sha256sum "${BINARY_NAME}-${GITHUB_REF_NAME}.tar.gz" > "${BINARY_NAME}-${GITHUB_REF_NAME}.tar.gz.sha256"
      - name: Verify release artifacts
        run: |
          test -f "../konnector_"*"_amd64.deb"
          test -f "konnector-${{ github.ref_name }}.tar.gz"
          test -f "konnector-${{ github.ref_name }}.tar.gz.sha256"
          ls -la ../*.deb konnector-${{ github.ref_name }}.tar.gz*
      - name: Publish GitHub release (Linux)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            ../konnector_*_amd64.deb
            konnector-${{ github.ref_name }}.tar.gz
            konnector-${{ github.ref_name }}.tar.gz.sha256
          generate_release_notes: true

  windows:
    name: Build Windows package
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo files
        uses: Swatinem/rust-cache@v2
      - name: Set package version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${TAG}\"/" Cargo.toml
          cargo update -p konnector
      - name: Build release binary
        run: cargo build --release --locked --bin konnector
      - name: Package Windows zip
        shell: bash
        run: |
          mkdir -p artifact
          cp target/release/konnector.exe artifact/konnector.exe
          cp -R configs artifact/configs
          cp windows/konnector.env.example artifact/konnector.env.example
          powershell -NoProfile -Command "Compress-Archive -Path artifact\\* -DestinationPath konnector-${{ github.ref_name }}-windows-x86_64.zip -Force"
          powershell -NoProfile -Command "(Get-FileHash konnector-${{ github.ref_name }}-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower() + '  konnector-${{ github.ref_name }}-windows-x86_64.zip'" > konnector-${{ github.ref_name }}-windows-x86_64.zip.sha256
          ls -la konnector-${{ github.ref_name }}-windows-x86_64.zip*
      - name: Publish GitHub release (Windows)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            konnector-${{ github.ref_name }}-windows-x86_64.zip
            konnector-${{ github.ref_name }}-windows-x86_64.zip.sha256
          generate_release_notes: true
